###############################################################################
#  ego_bridge_param.yaml — EGO-to-PX4 桥接节点完整配置
###############################################################################

# ====================== 1. 控制频率 ======================
# 桥接节点向 PX4 发送 setpoint 的频率 (Hz)
# - 必须 >= 2Hz，否则 PX4 OFFBOARD 超时
# - 推荐 50Hz，足够稳定且不增加通信负担
# - 调高(100Hz)：跟踪更紧密，CPU负担增大
# - 调低(20Hz)：高速飞行时可能不够平滑
ctrl_freq: 50.0

# ====================== 2. OFFBOARD 切换 ======================
offboard:
  # 切换前预发送帧数 (实际时间 = pre_send_count / ctrl_freq)
  # - 默认 100帧 = 2秒
  # - 调低(50帧)：响应更快，部分固件可能拒绝
  # - 调高(150帧)：更保险但等待更久
  pre_send_count: 50

  # OFFBOARD 切换超时 (s)
  # - 在此时间内间歇尝试切换（每 1 秒一次）
  # - 全部失败 → 回 IDLE 打 ERROR
  # - 调高(10s)：给更多机会
  # - 调低(3s)：更快放弃
  timeout: 5.0

  # 是否自动 ARM
  # - true: 自动解锁（无人值守）
  # - false: 需手动解锁（调试更安全）
  enable_auto_arm: true

# ====================== 3. 起飞参数 ======================
takeoff:
  # 起飞目标高度 (m)
  # - 调高(1.5)：更安全但更慢
  # - 调低(0.5)：快速但地效影响大
  # - ⚠️ 不低于 0.3m
  height: 1.1
  # 爬升速度 (m/s)
  # - 调高(0.5)：更快但过冲大
  # - 调低(0.2)：更稳但更慢
  # - ⚠️ 不超过 PX4 MPC_Z_VEL_MAX_UP
  speed: 0.4

  # 电机预热时间 (s)
  # - 调高(3.0)：启动更柔和
  # - 调低(1.0)：更快但可能弹跳
  motor_warmup_time: 0.8

  # 预热高度偏移 (m)
  motor_warmup_height: 0.05

  # 接近目标时减速距离 (m)
  # - 调高(0.5)：减速更平滑
  # - 调低(0.1)：接近急停
  decel_distance: 0.35

  # 起飞到达判定阈值 (m)
  # - remaining <= 阈值 即进入 HOVER
  reach_threshold: 0.06

  # 起飞最小上升速度 (m/s)
  # - 防止减速阶段速度过小导致爬升停滞
  min_speed: 0.1

  # 起飞完成后延迟发 trigger (s)
  # - 让悬停稳定后再通知 EGO 规划
  delay_trigger_time: 2.0

# ====================== 4. 降落参数 ======================
landing:
  # 下降速度 (m/s)，正值
  # - ⚠️ 不超过 PX4 MPC_Z_VEL_MAX_DN
  speed: 0.18

  # 降落开始后至少等待多久才启用触地检测 (s)
  # - 防止刚进入 LANDING 时因瞬时速度很小而误判触地
  min_detect_time: 2.0

  # 着陆检测：目标低于实际多少 (m)，负值
  # - 不依赖 odom.z 归零，而是检测“目标继续下压但飞机不再下降”
  land_pos_deviation: -0.08

  # 着陆检测：速度阈值 (m/s)
  # - 使用垂直速度 |vz|，不是总速度
  land_vel_threshold: 0.08

  # 着陆检测：持续时间 (s)
  land_hold_time: 1.0

# ====================== 5. 消息超时 ======================
timeout:
  # EGO cmd 超时 (s) → TRACKING 回 HOVER
  cmd: 0.5

  # 里程计超时 (s) → 停发 setpoint → PX4 failsafe
  odom: 0.5

  # RC 超时 (s)
  rc: 0.5

# ====================== 6. 到达检测 ======================
reach_detect:
  # 位置阈值 (m)
  # - ⚠️ 应大于 PX4 位置控制器稳态误差 (0.1~0.3m)
  pos_threshold: 0.3

  # 速度阈值 (m/s)，检测 EGO cmd 的期望速度
  vel_threshold: 0.1

  # 持续时间 (s)
  hold_time: 1.0

# ====================== 7. RC 遥控器 ======================
rc:
  # 通道号 (0-indexed)
  channel_arm: 4     # SWB
  channel_mode: 5    # SWC

  # 触发阈值 (0~1)
  threshold: 0.75

  # 防抖间隔 (s)
  debounce_time: 2.0

# ====================== 8. 控制权交接 ======================
override:
  # 是否启用
  enable: true

  # 接管命令超时 (s) → 在当前位置悬停
  cmd_timeout: 0.5

# ====================== 9. 调试 ======================
debug:
  # 是否启用调试话题 (~debug)
  # - 发布：状态编号、到达距离、cmd年龄、控制模式等
  enable: false

# ====================== PX4 参数备忘 (不被代码读取) ======================
# COM_OF_LOSS_T    = 1.0       # OFFBOARD 超时
# COM_OBL_RC_ACT   = 0         # OFFBOARD 丢失 → Position 模式
# NAV_RCL_ACT      = 2         # RC 丢失 → Land
# MPC_XY_VEL_MAX   >= EGO max_vel
# MPC_Z_VEL_MAX_UP >= takeoff.speed
# MPC_Z_VEL_MAX_DN >= landing.speed
# MPC_ACC_HOR      >= EGO max_acc
